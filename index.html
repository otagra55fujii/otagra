<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ワークショップ・マッピングボード (v0.44)</title>
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --admin-color: #673AB7; --primary: #0d47a1; --bg: #f5f7fa; --border: #cfd8dc; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { height: 100vh; overflow: hidden; background: var(--bg); display: flex; flex-direction: column; }

        /* ログイン画面 */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .login-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* メイン画面レイアウト */
        #main-container { display: none; flex-direction: column; height: 100vh; }
        
        /* 上部ツールバー */
        #toolbar { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 6px 12px; border: 1px solid var(--border); background: white; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; display: inline-flex; align-items: center; gap: 4px; transition: all 0.2s; }
        .btn:hover { background: #f0f4f8; }
        .btn-admin { background: #f3e5f5; color: var(--admin-color); border-color: #d1c4e9; }
        .btn-admin:hover { background: #ede7f6; }
        
        /* メイン表示領域（マップ ＋ コメント） */
        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* 画像マッピングエリア */
        #image-area { flex: 1; overflow: auto; background: #eaeded; position: relative; }
        #image-container { position: relative; display: inline-block; }
        #map-image { display: block; max-width: none; user-select: none; -webkit-user-drag: none; }
        
        /* 全体見渡しボタン（フロート） */
        #float-view-toggle { position: absolute; top: 15px; right: 15px; z-index: 105; background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.15); border: 1px solid var(--border); padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* 下部コメントエリア */
        #comment-area { height: 40%; background: white; border-top: 2px solid var(--border); display: flex; flex-direction: column; z-index: 102; }
        #comment-header { background: #f8f9fa; padding: 8px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; }
        #comment-list { flex: 1; overflow-y: auto; padding: 15px; }

        /* 同期ステータスバー（最下部） */
        #status-bar { background: #0a2540; color: #9ab4cd; padding: 6px 15px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; z-index: 103; }

        /* ピン・スレッド表現（省略・CSSは前バージョン同様に最適化） */
        .pin { position: absolute; width: 26px; height: 26px; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; transform: translate(-50%, -50%); cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        .pin.active { background-color: #2196F3 !important; transform: translate(-50%, -50%) scale(1.2); z-index: 11; box-shadow: 0 0 12px #2196F3; opacity: 1 !important; display: flex !important; }
        .comment-block { border: 1px solid var(--border); padding: 8px; margin-bottom: 8px; border-radius: 4px; background: #fff; position: relative; }
        .child-indent { margin-left: 20px; border-left: 3px solid #0d47a1; padding-left: 10px; margin-top: 4px; }
        .grandchild-indent { margin-left: 20px; border-left: 3px solid #ff9800; padding-left: 10px; margin-top: 4px; }
        .comment-meta { font-size: 11px; color: #757575; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .comment-text { font-size: 13px; color: #212121; word-break: break-all; }
        .like-btn { cursor: pointer; border: none; background: none; font-size: 12px; }
        .action-link { font-size: 11px; color: #0d47a1; cursor: pointer; margin-left: 10px; text-decoration: underline; }
        .action-link.del { color: #c62828; }
        .input-box { display: flex; gap: 5px; margin-top: 5px; }
        .input-box input { flex:1; padding: 6px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; }
        
        /* 新設：AIサクラボタンの専用スタイル */
        .btn-ai-inject { background: #f3e5f5; color: #673AB7; border: 1px dashed #673AB7; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .btn-ai-inject:hover { background: #e1bee7; }
        
        input[type="file"] { display: none; }
        .phase-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; }
    </style>
</head>
<body>

    <!-- 1. ログイン画面 -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="text-align:center; margin-bottom: 20px; color:#333;">🗺️ WSマッピングボード</h2>
            <div class="form-group"><label>あなたの表示名</label><input type="text" id="input-name" placeholder="自由に入力（例：たろう）"></div>
            <div class="form-group"><label>部屋名（スペースの識別）</label><input type="text" id="input-room" placeholder="例：防犯A班"></div>
            <div class="form-group"><label>招待コード（またはADMIN123）</label><input type="text" id="input-code" placeholder="4桁のコードを入力"></div>
            <button class="login-btn" onclick="tryLogin()">入室する 🚪</button>
        </div>
    </div>

    <!-- 2. メインコンテナ -->
    <div id="main-container">
        <!-- ツールバー -->
        <div id="toolbar">
            <span id="room-title" style="font-weight: bold; color: var(--primary); margin-right: 10px;">🏠 部屋: 加盟中...</span>
            
            <!-- 参加者用コード変更（管理者限定） -->
            <div id="admin-code-zone" style="display:none; align-items:center; gap:5px;">
                <span style="font-size:12px; color:#666;">🔑 参加者コード: <b id="txt-user-code">1234</b></span>
                <button class="btn btn-admin" onclick="generateNewUserCode()">🔄変更</button>
            </div>

            <!-- 画像読み込み（管理者限定） -->
            <label id="admin-img-label" class="btn btn-admin" style="display:none;">🖼️ 画像読込<input type="file" accept="image/*" onchange="handleImageUpload(event)"></label>

            <!-- フェーズ切替（管理者限定） -->
            <div id="admin-phase-zone" style="display:none; align-items:center; gap:4px; border-left:1px solid #ccc; padding-left:10px;">
                <span style="font-size:12px; color:#666;">📍 次のピン色:</span>
                <button class="btn" style="color:#ef5350;" onclick="setNextPinColor('red')">🔴</button>
                <button class="btn" style="color:#ff9800;" onclick="setNextPinColor('orange')">🟠</button>
                <button class="btn" style="color:#8bc34a;" onclick="setNextPinColor('limegreen')">🟢</button>
                <span id="txt-current-color" style="font-size:12px; font-weight:bold; color:#ef5350;">(赤)</span>
            </div>

            <div style="flex-grow: 1;"></div> <!-- 右寄せ用バッファ -->

            <!-- 管理者用データ出力・管理（管理者限定） -->
            <button id="admin-csv-btn" class="btn btn-admin" style="display:none;" onclick="exportToCSV()">📊 CSV書き出し</button>
            <button id="admin-save-btn" class="btn btn-admin" style="display:none;" onclick="saveToJSON()">📥 JSON保存</button>
            <button id="admin-lock-btn" class="btn btn-admin" style="display:none;" onclick="toggleRoomLock()">🔓 ロック:OFF</button>
            <button id="admin-clear-btn" class="btn btn-admin" style="display:none; color:#c62828;" onclick="clearRoomData()">🧹 初期化</button>
            
            <button class="btn" onclick="location.reload()">退室 🚪</button>
        </div>

        <!-- メインコンテンツ -->
        <div id="workspace">
            <!-- マップエリア -->
            <div id="image-area" onclick="handleMapClick(event)">
                <div id="image-container">
                    <img id="map-image" src="" alt="背景マップ（画像が読み込まれるとここに表示されます）">
                    <div id="pins-container"></div>
                </div>
            </div>
            
            <!-- フロート配置：全体見渡しボタン -->
            <button id="float-view-toggle" onclick="togglePinVisibility()">📍 ピン: 表示中</button>

            <!-- コメントエリア -->
            <div id="comment-area">
                <div id="comment-header">
                    <span id="comment-title">📍 ピンを選択してください</span>
                    <!-- 💡 転用：AIサクラ（サンプル意見）投入ボタン（管理者画面かつ未書き込みのピンで出現） -->
                    <button id="ai-inject-btn" class="btn-ai-inject" style="display:none;" onclick="injectAISampleComments()">🤖 サンプル意見を投入</button>
                </div>
                <div id="comment-list"></div>
            </div>
        </div>

        <!-- ステータスバー（最下部） -->
        <div id="status-bar">
            <div>ユーザー: <b id="status-user">-</b> | 権限: <b id="status-role">-</b></div>
            <div id="status-sync">🔄 Firebaseと同期中...</div>
        </div>
    </div>

    <script>
        // --- Firebase初期化（お手持ちの有効なキーに差し替えてください） ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // アプリ内グローバル状態
        const PIN_COLORS = { red: "#ef5350", orange: "#ff9800", limegreen: "#8bc34a" };
        let myProfile = { name: "", room: "", role: "user" };
        let roomState = { config: {}, pins: {} };
        let activePinId = null;
        let pinVisibilityState = 'normal'; // normal, semi, hidden

        // 安全なハイブリッドID生成（タイムスタンプ + ランダム5桁）
        function generateUniqueId() {
            const ts = Date.now();
            const rnd = Math.random().toString(36).substring(2, 7);
            return `${ts}_${rnd}`;
        }

        // ログイン処理
        function tryLogin() {
            const name = document.getElementById('input-name').value.trim();
            const room = document.getElementById('input-room').value.trim();
            const code = document.getElementById('input-code').value.trim();

            if(!name || !room || !code) { alert("すべての項目を入力してください。"); return; }

            myProfile.name = name;
            myProfile.room = room;

            if(code === "ADMIN123") {
                myProfile.role = "admin";
                bootApp();
            } else {
                // データベースから部屋の現在のコードを取得して認証
                db.ref(`rooms/${room}/config/userCode`).once('value', (snap) => {
                    const currentCode = snap.val() || "1234"; // デフォルト初期値
                    if(code === currentCode.toString()) {
                        myProfile.role = "user";
                        bootApp();
                    } else {
                        alert("招待コードが正しくありません。");
                    }
                });
            }
        }

        // アプリ起動と同期開始
        function bootApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            
            document.getElementById('status-user').innerText = myProfile.name;
            document.getElementById('status-role').innerText = myProfile.role === 'admin' ? '管理者' : '参加者';
            document.getElementById('room-title').innerText = `🏠 部屋: ${myProfile.room}`;

            if(myProfile.role === 'admin') {
                document.querySelectorAll('[id^="admin-"]').forEach(el => el.style.display = 'inline-flex');
            }

            // リアルタイム同期リスナー開始
            db.ref(`rooms/${myProfile.room}`).on('value', (snap) => {
                const data = snap.val() || {};
                
                // データ構造の自動補修（リペア）
                if(!data.config) data.config = {};
                if(!data.config.nextColor) data.config.nextColor = 'red';
                if(!data.config.userCode) data.config.userCode = '1234';
                if(!data.config.isLocked) data.config.isLocked = false;
                if(!data.pins) data.pins = {};
                
                // Firebaseの配列化バグをオブジェクトに再シリアライズ
                if(Array.isArray(data.pins)) {
                    const obj = {};
                    data.pins.forEach((p, idx) => { if(p) { if(!p.id) p.id = idx; obj[p.id] = p; } });
                    data.pins = obj;
                }

                roomState = data;
                renderApp();
                document.getElementById('status-sync').innerText = "✅ 同期完了";
            });
        }

        // 管理者：次のピン色を変更
        function setNextPinColor(color) {
            db.ref(`rooms/${myProfile.room}/config/nextColor`).set(color);
        }

        // 管理者：招待コードをランダム生成
        function generateNewUserCode() {
            const newCode = Math.floor(1000 + Math.random() * 9000);
            db.ref(`rooms/${myProfile.room}/config/userCode`).set(newCode);
        }

        // 管理者：編集ロック切り替え
        function toggleRoomLock() {
            const nextState = !roomState.config.isLocked;
            db.ref(`rooms/${myProfile.room}/config/isLocked`).set(nextState);
        }

        // 管理者：画像アップロード＆自動最適化（横幅1000px/JPEG70%）
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 1000;
                    let w = img.width, h = img.height;
                    if(w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    db.ref(`rooms/${myProfile.room}/imageSrc`).set(compressedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsText(file);
        }

        // ピン全体見渡しトグル（表示 ➔ 半透明 ➔ 非表示）
        function togglePinVisibility() {
            const btn = document.getElementById('float-view-toggle');
            if (pinVisibilityState === 'normal') { pinVisibilityState = 'semi'; btn.innerText = '📍 ピン: 半透明'; }
            else if (pinVisibilityState === 'semi') { pinVisibilityState = 'hidden'; btn.innerText = '📍 ピン: 非表示'; }
            else { pinVisibilityState = 'normal'; btn.innerText = '📍 ピン: 表示中'; }
            renderApp();
        }

        // マップクリック時のピン設置（部分通信トランザクション処理）
        function handleMapClick(e) {
            if(roomState.config.isLocked && myProfile.role !== 'admin') { alert("現在、管理者が書き込みをロックしています。"); return; }
            if(e.target.id !== 'map-image' && e.target.id !== 'image-area') return;

            const rect = document.getElementById('image-container').getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            const newPinId = generateUniqueId();
            const pinRef = db.ref(`rooms/${myProfile.room}/pins/${newPinId}`);

            // 画像データを含まない、pinsノードのみの独立トランザクション
            pinRef.transaction((currentData) => {
                if (currentData === null) {
                    const pinCount = Object.keys(roomState.pins || {}).length + 1;
                    return {
                        id: newPinId,
                        number: pinCount,
                        x: parseFloat(x.toFixed(2)),
                        y: parseFloat(y.toFixed(2)),
                        color: roomState.config.nextColor || 'red',
                        mainComment: null,
                        children: {}
                    };
                }
                return; // 既に存在すれば何もしない
            }, (error, committed, snapshot) => {
                if (committed) { activePinId = newPinId; }
            });
        }

        // 💡 転用：AIサクラ（サンプル意見）投入ロジック（超軽量トランザクション直撃）
        function injectAISampleComments() {
            if (!activePinId || myProfile.role !== 'admin') return;
            
            const targetPinRef = db.ref(`rooms/${myProfile.room}/pins/${activePinId}`);
            
            const samples = [
                { author: "🤖 AI視点① (地域住民)", text: "昼間は人通りが多い場所ですが、夜間は街路樹の影で死角ができやすく、照明の増設など防犯面の強化が必要だと感じます。" },
                { author: "🤖 AI視点② (専門家)", text: "動線設計の観点から分析すると、この交差点は歩行者と自転車の交差タイミングが重なりやすく、潜在的な接触リスクが高いです。" },
                { author: "🤖 AI視点③ (行政・防災)", text: "避難経路のシミュレーションにおいて、この周辺は道幅の狭さがボトルネックとなる恐れがあるため、空地の確保や誘導標識の整備が望まれます。" }
            ];

            // 5ミリ秒間隔の高速3連打で部分通信トランザクションを叩き、データ整合性を保ちながら一瞬でスレッドを構築
            samples.forEach((sample, index) => {
                setTimeout(() => {
                    targetPinRef.transaction((pin) => {
                        if (!pin) return pin;
                        
                        if (index === 0) {
                            // 1つ目は主コメントとして格納
                            if (!pin.mainComment) {
                                pin.mainComment = { author: sample.author, text: sample.text, likes: {} };
                            }
                        } else {
                            // 2つ目、3つ目は子コメント（返信）として格納
                            if (!pin.children) pin.children = {};
                            const childId = generateUniqueId();
                            pin.children[childId] = { id: childId, author: sample.author, text: sample.text, likes: {}, grandchildren: {} };
                        }
                        return pin;
                    });
                }, index * 5); // 5ms間隔の超高速アタック
            });
        }

        // コメント・いいね！等の各階層アクション（部分通信トランザクションで競合を完全回避）
        function handleCommentAction(type, path, extra = {}) {
            if(roomState.config.isLocked && myProfile.role !== 'admin' && type !== 'like') { alert("現在ロック中です。"); return; }
            
            const ref = db.ref(`rooms/${myProfile.room}/pins/${activePinId}${path}`);
            
            ref.transaction((data) => {
                if(type === 'post') {
                    const newId = generateUniqueId();
                    if(!data) data = {};
                    data[newId] = { id: newId, author: myProfile.name, text: extra.text, likes: {}, grandchildren: {} };
                    return data;
                }
                if(type === 'postMain') {
                    return { author: myProfile.name, text: extra.text, likes: {} };
                }
                if(type === 'like') {
                    if(!data) data = {};
                    if(data[myProfile.name]) { delete data[myProfile.name]; } 
                    else { data[myProfile.name] = true; }
                    return data;
                }
                if(type === 'edit') {
                    if(!data) return data;
                    data.text = extra.text;
                    return data;
                }
                if(type === 'delete') {
                    return null; // ノード削除
                }
                return data;
            });
        }

        // UI描画処理
        function renderApp() {
            // 管理者メタ情報反映
            document.getElementById('txt-user-code').innerText = roomState.config.userCode;
            document.getElementById('admin-lock-btn').innerText = roomState.config.isLocked ? "🔒 ロック:ON" : "🔓 ロック:OFF";
            document.getElementById('admin-lock-btn').style.background = roomState.config.isLocked ? "#ffebee" : "#white";
            
            const cColor = roomState.config.nextColor || 'red';
            const colorJP = { red: '(赤)', orange: '(橙)', limegreen: '(緑)' };
            document.getElementById('txt-current-color').innerText = colorJP[cColor];
            document.getElementById('txt-current-color').style.color = PIN_COLORS[cColor];

            // 背景画像
            document.getElementById('map-image').src = roomState.imageSrc || "";

            // ピン描画
            const pContainer = document.getElementById('pins-container');
            pContainer.innerHTML = '';
            
            Object.values(roomState.pins).forEach(pin => {
                const el = document.createElement('div');
                el.className = `pin ${pin.id === activePinId ? 'active' : ''}`;
                el.style.left = `${pin.x}%`;
                el.style.top = `${pin.y}%`;
                
                if (pin.id !== activePinId) {
                    el.style.backgroundColor = PIN_COLORS[pin.color] || pin.color;
                    if (pinVisibilityState === 'semi') el.style.opacity = '0.15';
                    else if (pinVisibilityState === 'hidden') el.style.display = 'none';
                }
                
                el.innerText = pin.number;
                el.onclick = (e) => { e.stopPropagation(); activePinId = pin.id; renderApp(); };
                pContainer.appendChild(el);
            });

            renderCommentsUI();
        }

        // コメント欄UI描画
        function renderCommentsUI() {
            const listEl = document.getElementById('comment-list');
            const titleEl = document.getElementById('comment-title');
            const aiBtn = document.getElementById('ai-inject-btn');
            
            listEl.innerHTML = '';
            aiBtn.style.display = 'none';

            const pin = roomState.pins[activePinId];
            if(!pin) {
                titleEl.innerText = "📍 ピンを選択してください";
                listEl.innerHTML = '<p style="text-align:center;color:#888;padding-top:30px;">画像上のピンをタップすると、ここに掲示板が展開されます。</p>';
                return;
            }

            titleEl.innerText = `📌 No.${pin.number} の掲示板 (${pin.color === 'red' ? '前半' : pin.color === 'orange' ? '中盤' : '後半'})`;
            
            // 管理者かつ、まだ主コメントが一度も書き込まれていないクリーンなピンの場合に「サンプル意見投入」ボタンを表示
            if(myProfile.role === 'admin' && !pin.mainComment) {
                aiBtn.style.display = 'inline-block';
            }

            let html = '';

            // 1階層目：主コメント
            if(!pin.mainComment) {
                html += `
                    <div style="padding:10px; text-align:center; border:1px dashed #ccc;">
                        <p style="font-size:12px; color:#666; margin-bottom:5px;">この場所への最初のコメントを書き込みましょう</p>
                        <div class="input-box">
                            <input type="text" id="input-main" placeholder="150文字以内で気づきを入力..." maxlength="150">
                            <button class="btn" onclick="let val=document.getElementById('input-main').value; if(val.trim()){ handleCommentAction('postMain', '/mainComment', {text:val}); }">投稿</button>
                        </div>
                    </div>
                `;
            } else {
                html += renderCommentBlock(pin.mainComment, '/mainComment', 1);
                
                // 2階層目（子返信リスト）
                const children = pin.children ? Object.values(pin.children) : [];
                children.forEach(c => {
                    html += `<div class="child-indent">`;
                    html += renderCommentBlock(c, `/children/${c.id}`, 2);
                    
                    // 3階層目（孫返信リスト）
                    const grandchildren = c.grandchildren ? Object.values(c.grandchildren) : [];
                    grandchildren.forEach(g => {
                        html += `<div class="grandchild-indent">`;
                        html += renderCommentBlock(g, `/children/${c.id}/grandchildren/${g.id}`, 3);
                        html += `</div>`;
                    });

                    // 孫への投稿フォーム（子コメントの最大数10件未満の場合）
                    if(grandchildren.length < 10) {
                        html += `
                            <div class="input-box grandchild-indent">
                                <input type="text" id="in-${c.id}" placeholder="再返信を入力..." maxlength="150">
                                <button class="btn" onclick="let val=document.getElementById('in-${c.id}').value; if(val.trim()){ handleCommentAction('post', '/children/${c.id}/grandchildren', {text:val}); }">返信</button>
                            </div>
                        `;
                    }
                    html += `</div>`;
                });

                // 子への投稿フォーム（主コメントが存在し、かつ子コメントが10件未満の場合）
                if(children.length < 10) {
                    html += `
                        <div class="input-box child-indent" style="margin-top:10px;">
                            <input type="text" id="input-child-main" placeholder="この意見への返信を入力..." maxlength="150">
                            <button class="btn" onclick="let val=document.getElementById('input-child-main').value; if(val.trim()){ handleCommentAction('post', '/children', {text:val}); }">返信</button>
                        </div>
                    `;
                }
            }

            listEl.innerHTML = html;
        }

        // コメント単体ブロックHTML生成
        function renderCommentBlock(item, path, depth) {
            const likes = item.likes || {};
            const likeCount = Object.keys(likes).length;
            const hasLiked = likes[myProfile.name] ? '❤️' : '🤍';
            
            const isMyPost = item.author === myProfile.name;
            const isAdmin = myProfile.role === 'admin';
            
            let actionLinks = '';
            if(isMyPost || isAdmin) {
                actionLinks += `<span class="action-link" onclick="let val=prompt('コメントを修正:', '${item.text}'); if(val!==null && val.trim()){ handleCommentAction('edit', '${path}', {text:val}); }">修正</span>`;
                actionLinks += `<span class="action-link del" onclick="if(confirm('本当に削除しますか？')){ handleCommentAction('delete', '${path}'); }">削除</span>`;
            }

            return `
                <div class="comment-block">
                    <div class="comment-meta">
                        <span><b>${item.author}</b> ${actionLinks}</span>
                        <button class="like-btn" onclick="handleCommentAction('like', '${path}/likes')">${hasLiked} ${likeCount}</button>
                    </div>
                    <div class="comment-text">${item.text}</div>
                </div>
            `;
        }

        // 管理者：Excel用CSVエクスポート（BOM付きUTF-8）
        function exportToCSV() {
            let csv = '\uFEFFピン番号,フェーズ(色),階層,投稿者,コメント内容,いいね数\n';
            Object.values(roomState.pins).forEach(p => {
                const colorMap = { red: '前半(赤)', orange: '中盤(橙)', limegreen: '後半(緑)' };
                const cName = colorMap[p.color] || p.color;
                
                if(p.mainComment) {
                    const l1 = Object.keys(p.mainComment.likes || {}).length;
                    csv += `${p.number},${cName},主コメント,"${p.mainComment.author}","${p.mainComment.text.replace(/"/g, '""')}",${l1}\n`;
                    
                    const children = p.children ? Object.values(p.children) : [];
                    children.forEach(c => {
                        const l2 = Object.keys(c.likes || {}).length;
                        csv += `${p.number},${cName},└返信(子),"${c.author}","${c.text.replace(/"/g, '""')}",${l2}\n`;
                        
                        const grandchildren = c.grandchildren ? Object.values(c.grandchildren) : [];
                        grandchildren.forEach(g => {
                            const l3 = Object.keys(g.likes || {}).length;
                            csv += `${p.number},${cName},  └再返信(孫),"${g.author}","${g.text.replace(/"/g, '""')}",${l3}\n`;
                        });
                    });
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `comments_${myProfile.room}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 管理者：JSONバックアップ保存
        function saveToJSON() {
            const now = new Date();
            const timestamp = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const exportData = {
                roomName: myProfile.room,
                exportedAt: timestamp,
                appData: roomState
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `backup_${myProfile.room}_${Date.now()}.json`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 管理者：完全初期化
        function clearRoomData() {
            if(confirm("【警告】部屋のすべてのデータを完全に削除します。よろしいですか？")) {
                if(confirm("本当に最終確認です。元に戻せませんが初期化しますか？")) {
                    db.ref(`rooms/${myProfile.room}`).remove().then(() => {
                        location.reload();
                    });
                }
            }
        }
    </script>
</body>
</html>
